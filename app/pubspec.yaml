name: servicos_app
description: Plataforma de intermediação de serviços com geolocalização.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Supabase
  supabase_flutter: ^2.5.0

  # Geolocalização e Mapas
  geolocator: ^12.0.0
  google_maps_flutter: ^2.9.0
  geocoding: ^3.0.0

  # UI & Navegação
  go_router: ^13.2.0
  flutter_svg: ^2.0.10
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  lottie: ^3.1.0

  # Estado
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Formulários e Validação
  reactive_forms: ^17.0.1
  image_picker: ^1.1.2
  file_picker: ^8.0.7

  # Pagamentos
  flutter_stripe: ^10.1.1

  # Utils
  intl: ^0.19.0
  timeago: ^3.7.0
  url_launcher: ^6.3.1
  permission_handler: ^11.3.1
  flutter_local_notifications: ^17.2.2
  share_plus: ^9.0.0

  # Chat / Realtime
  flutter_chat_ui: ^1.6.15

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  riverpod_generator: ^2.4.0
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
